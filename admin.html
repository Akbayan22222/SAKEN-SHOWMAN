<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin SAKEN SHOW</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body style="background:#222; color:white; text-align:center; padding-top:50px; font-family:sans-serif;">
    <h1>УПРАВЛЕНИЕ ЛОТЕРЕЕЙ</h1>
    <button style="width:90%; height:150px; background:gold; font-size:30px; font-weight:bold; border-radius:25px; cursor:pointer;" onclick="spin()">🎰 КРУТИТЬ БАРАБАН 🎰</button>
    <p id="st">Ожидание экрана...</p>
    <script>
        const LOT_ID = 'medet_luck_2026';
        const peer = new Peer();
        function spin() {
            const conn = peer.connect(LOT_ID);
            conn.on('open', () => {
                conn.send({ start: true });
                document.getElementById('st').innerText = "Команда отправлена!";
            });
        }
    </script>
</body>
</html>
