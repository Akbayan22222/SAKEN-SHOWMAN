<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Control Panel - Medet Ibadulla</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .panel { background: #2a2a2a; padding: 40px; border-radius: 20px; text-align: center; width: 85%; max-width: 500px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        #count { font-size: 60px; color: #00ffcc; margin: 10px 0; font-weight: bold; }
        button { width: 100%; height: 100px; font-size: 25px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; margin-bottom: 20px; transition: 0.2s; }
        .btn-flash { background: #007bff; color: white; }
        .btn-beat { background: #ff3b30; color: white; height: 70px; font-size: 18px; }
        .active-beat { background: #28a745; box-shadow: 0 0 20px #28a745; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="panel">
        <h2>УПРАВЛЕНИЕ ЗАЛОМ</h2>
        <p style="color: #ff0055; font-weight: bold;">MEDET IBADULLA SHOW</p>
        <div id="count">0</div>
        <p>Гостей в сети</p>
        <button class="btn-flash" onclick="sendFlash()">🔥 ЗАЖЕЧЬ ЗАЛ 🔥</button>
        <button id="beatBtn" class="btn-beat" onclick="toggleMusicMode()">ВКЛЮЧИТЬ АВТО-БИТ</button>
    </div>

    <script>
        // Жаңа уникалды ID
        const ADMIN_ID = 'medet_ibadulla_show_2026';
        const peer = new Peer(ADMIN_ID);
        let connections = [];
        let isBeatMode = false;
        let audioContext, analyser, dataArray;

        peer.on('connection', (conn) => {
            connections.push(conn);
            document.getElementById('count').innerText = connections.length;
            conn.on('close', () => {
                connections = connections.filter(c => c !== conn);
                document.getElementById('count').innerText = connections.length;
            });
        });

        function sendFlash() {
            connections.forEach(conn => { if (conn.open) conn.send('FLASH'); });
        }

        async function toggleMusicMode() {
            if (isBeatMode) {
                isBeatMode = false;
                document.getElementById('beatBtn').classList.remove('active-beat');
                document.getElementById('beatBtn').innerText = "ВКЛЮЧИТЬ АВТО-БИТ";
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                isBeatMode = true;
                document.getElementById('beatBtn').classList.add('active-beat');
                document.getElementById('beatBtn').innerText = "СЛУШАЮ МУЗЫКУ...";
                detectBeat();
            } catch (err) {
                alert("Микрофонға рұқсат беріңіз!");
            }
        }

        function detectBeat() {
            if (!isBeatMode) return;
            analyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for (let i = 0; i < 4; i++) sum += dataArray[i]; 
            let avg = sum / 4;

            if (avg > 165) { 
                sendFlash();
                setTimeout(detectBeat, 150); 
            } else {
                requestAnimationFrame(detectBeat);
            }
        }
    </script>
</body>
</html>
