<!DOCTYPE html>
<html>
<head>
    <title>Admin Lottery</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body style="background:#222; color:white; text-align:center; font-family:sans-serif">
    <h1>УПРАВЛЕНИЕ ЛОТЕРЕЕЙ</h1>
    <button style="width:90%; height:150px; background:gold; font-size:30px; font-weight:bold; border-radius:20px" onclick="spin()">🎰 КРУТИТЬ БАРАБАН 🎰</button>
    <script>
        const ADMIN_ID = 'medet_luck_2026';
        const peer = new Peer();
        function spin() {
            const conn = peer.connect(ADMIN_ID);
            conn.on('open', () => conn.send({ start: true }));
        }
    </script>
</body>
</html>
