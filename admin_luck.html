<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Lottery Control</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body style="background:#1a1a1a; color:white; text-align:center; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0">
    
    <h1>УПРАВЛЕНИЕ ЛОТЕРЕЕЙ</h1>
    <div id="status" style="margin-bottom:20px; color:gold">Ожидание подключения экрана...</div>
    
    <button style="width:90%; height:150px; background:linear-gradient(gold, orange); font-size:30px; font-weight:bold; border-radius:25px; border:none; cursor:pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5)" onclick="spin()">🎰 КРУТИТЬ БАРАБАН 🎰</button>

    <script>
        const MY_ADMIN_ID = 'medet_luck_2026'; // Бұл Админнің тұрақты аты
        const peer = new Peer(MY_ADMIN_ID); // Осы атпен тіркелеміз
        let connections = [];

        // Экран қосылғанда оны тізімге сақтаймыз
        peer.on('connection', (conn) => {
            conn.on('open', () => {
                connections.push(conn);
                document.getElementById('status').innerText = "ЭКРАН ПОДКЛЮЧЕН! ✅";
                document.getElementById('status').style.color = "#00ffcc";
            });
        });

        function spin() {
            if (connections.length === 0) {
                alert("Ошибка: Экран лотереи не открыт или не подключен!");
                return;
            }
            // Барлық қосылған экрандарға "баста" командасын жіберу
            connections.forEach(conn => {
                if (conn.open) {
                    conn.send({ start: true });
                }
            });
            console.log("Команда на запуск отправлена!");
        }

        peer.on('error', (err) => {
            console.error("PeerJS Error:", err);
            if (err.type === 'unavailable-id') {
                alert("Этот ID уже занят! Возможно, админка открыта в другой вкладке.");
            }
        });
    </script>
</body>
</html>
